name: Save PDF as Base64 Text

on:
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download PDF (JBMO 2020 Shortlist)
        run: curl -L -o jbmo2020.pdf "https://pregatirematematicaolimpiadejuniori.wordpress.com/wp-content/uploads/2021/07/jbmo_shortlist_2020.pdf"

      - name: Convert to Base64 text
        run: base64 jbmo2020.pdf > jbmo2020_base64.txt

      - name: Commit text file to repo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add jbmo2020_base64.txt
          git commit -m "Add base64 text of JBMO 2020 shortlist"
          git push
