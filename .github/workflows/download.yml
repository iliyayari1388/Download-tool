name: Convert PDF to Base64 Text

on:
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download PDF
        run: curl -L -o CompendiumJBMO.pdf "http://www.toomates.net/biblioteca/CompendiumJBMO.pdf"

      - name: Convert PDF to Base64
        run: base64 CompendiumJBMO.pdf > pdf_base64.txt

      - name: Commit text file to repository
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add pdf_base64.txt
          git commit -m "Add base64 encoded PDF" || echo "No changes to commit"
          git push
